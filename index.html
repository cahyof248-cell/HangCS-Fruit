<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HangCS Fruit — Dari Kebun Langsung ke Tangan Konsumen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&family=Work+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --daun-tua:#1E3424;
    --daun-tua-soft:#27432E;
    --kapur:#F3EFE3;
    --kapur-tray:#E8E4D6;
    --air-jeruk:#8FAE3A;
    --air-jeruk-deep:#6E8C2A;
    --tanah-liat:#A8472B;
    --ink-line: rgba(30,52,36,0.16);
    --ink-line-strong: rgba(30,52,36,0.32);
    --font-stencil:'Allerta Stencil', sans-serif;
    --font-body:'Work Sans', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --max-w: 1140px;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--kapur);
    color:var(--daun-tua);
    font-family:var(--font-body);
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  img{max-width:100%;display:block;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--air-jeruk);color:var(--daun-tua);}

  .wrap{max-width:var(--max-w);margin:0 auto;padding:0 28px;}

  .eyebrow{
    font-family:var(--font-mono);
    font-size:12.5px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--air-jeruk-deep);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow .slice{width:14px;height:14px;flex-shrink:0;}

  h1,h2,h3{
    font-family:var(--font-stencil);
    font-weight:400;
    letter-spacing:0.01em;
    line-height:1.05;
    text-transform:uppercase;
  }

  /* ---------- divider / signature motif ---------- */
  .divider{
    display:flex;
    align-items:center;
    gap:18px;
    margin:0 0 18px;
    color:var(--daun-tua);
  }
  .divider .line{flex:1;height:1px;background:var(--ink-line-strong);}
  .lime-slice{width:30px;height:30px;flex-shrink:0;}

  /* ---------- NAV ---------- */
